<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reports – SmartSalary</title>
  <link rel="stylesheet" href="css/style.css"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <nav class="navbar">
    <div class="nav-brand">💰 SmartSalary</div>
    <div class="nav-links"><a href="home.html">Logout</a></div>
  </nav>

  <div class="app-layout">
    <aside class="sidebar">
      <a href="dashboard.html"><span class="icon">🏠</span> Dashboard</a>
      <a href="allocation.html"><span class="icon">📊</span> Allocation</a>
      <a href="expenses.html"><span class="icon">💸</span> Expenses</a>
      <a href="goals.html"><span class="icon">🎯</span> Goals</a>
      <a href="wishlist.html"><span class="icon">⭐</span> Wishlist</a>
      <a href="reports.html" class="active"><span class="icon">📈</span> Reports</a>
    </aside>

    <main class="main-content">
      <div class="page-header">
        <h1>Reports & Insights</h1>
        <p>Visual overview of your financial health</p>
      </div>

      <!-- Budget Summary Cards -->
      <div class="reports-summary" id="summaryRow"></div>

      <!-- Charts Grid -->
      <div class="charts-grid">
        <!-- Pie: Salary Split -->
        <div class="chart-card">
          <h3>Salary Split</h3>
          <div class="chart-container">
            <canvas id="rPieChart"></canvas>
          </div>
        </div>

        <!-- Bar: Expenses -->
        <div class="chart-card">
          <h3>Expense Breakdown</h3>
          <div class="chart-container">
            <canvas id="rBarChart"></canvas>
          </div>
        </div>
      </div>

      <!-- Line: Savings Growth -->
      <div class="chart-card" style="margin-top:1.5rem">
        <h3>Savings Growth (6 Months)</h3>
        <div class="chart-container" style="height:280px">
          <canvas id="rLineChart"></canvas>
        </div>
      </div>
    </main>
  </div>

  <script src="js/charts.js"></script>
  <script>
    let rPieChart = null, rBarChart = null, rLineChart = null;

    function renderReports() {
      // Always read fresh from localStorage
      const salary  = getSalary();
      const alloc   = getAllocation();
      const expenses = JSON.parse(localStorage.getItem('ssm_expenses') || '[]');

      // ── Budget Summary ──
      const totalExp    = expenses.reduce((s, e) => s + e.amount, 0);
      const savingsAlloc = (alloc.Savings    / 100) * salary;
      const investAlloc  = (alloc.Investment / 100) * salary;
      const remaining    = Math.max(salary - totalExp, 0);

      document.getElementById('summaryRow').innerHTML = [
        { label: 'Monthly Salary',      value: fmt(salary) },
        { label: 'Total Expenses',       value: fmt(totalExp) },
        { label: 'Savings Allocated',    value: fmt(savingsAlloc) + ' (' + alloc.Savings + '%)' },
        { label: 'Investment Allocated', value: fmt(investAlloc)  + ' (' + alloc.Investment + '%)' },
        { label: 'Remaining Balance',    value: fmt(remaining) }
      ].map(s => `
        <div class="summary-item">
          <div class="s-label">${s.label}</div>
          <div class="s-value">${s.value}</div>
        </div>`).join('');

      // ── Pie Chart: Salary Split (uses saved allocation %) ──
      const allocAmounts = CATEGORIES.map(c => (alloc[c] / 100) * salary);
      if (rPieChart) {
        rPieChart.data.datasets[0].data = allocAmounts;
        rPieChart.update();
      } else {
        rPieChart = buildDonut(
          document.getElementById('rPieChart').getContext('2d'),
          CATEGORIES, allocAmounts, COLOR_VALUES
        );
      }

      // ── Bar Chart: Expenses by Category ──
      const grouped = {};
      expenses.forEach(e => { grouped[e.category] = (grouped[e.category] || 0) + e.amount; });
      const expLabels = Object.keys(grouped);
      const expData   = Object.values(grouped);
      const expColors = expLabels.map((_, i) => COLOR_VALUES[i % COLOR_VALUES.length]);
      const barCtx    = document.getElementById('rBarChart').getContext('2d');

      if (rBarChart) rBarChart.destroy();
      if (expLabels.length > 0) {
        rBarChart = buildBar(barCtx, expLabels, expData, expColors, 'Expenses (₹)');
      } else {
        // Show empty state message
        const wrap = document.getElementById('rBarChart').parentElement;
        const msg  = wrap.querySelector('.no-data');
        if (!msg) {
          const p = document.createElement('p');
          p.className = 'no-data';
          p.style.cssText = 'text-align:center;color:var(--text-muted);margin-top:1rem;font-size:0.875rem';
          p.textContent = 'No expense data yet';
          wrap.appendChild(p);
        }
      }

      // ── Line Chart: Cumulative Savings & Investment Growth ──
      const months = ['Jan','Feb','Mar','Apr','May','Jun'];
      const lineCtx = document.getElementById('rLineChart').getContext('2d');
      if (rLineChart) rLineChart.destroy();
      rLineChart = buildLine(lineCtx, months, [
        {
          label: 'Cumulative Savings (' + alloc.Savings + '%)',
          data: months.map((_, i) => savingsAlloc * (i + 1)),
          borderColor: '#06b6d4', backgroundColor: '#06b6d422', fill: true
        },
        {
          label: 'Cumulative Investment (' + alloc.Investment + '%)',
          data: months.map((_, i) => investAlloc * (i + 1)),
          borderColor: '#4f46e5', backgroundColor: '#4f46e522', fill: true
        }
      ]);
    }

    // Re-render whenever user navigates back to this page
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') renderReports();
    });

    // Also re-render if allocation/salary changes in another tab
    window.addEventListener('storage', (e) => {
      if (['ssm_allocation','ssm_salary','ssm_expenses'].includes(e.key)) renderReports();
    });

    renderReports();
  </script>
</body>
</html>
