<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Allocation – SmartSalary</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

  <nav class="navbar">
    <div class="nav-brand">💰 SmartSalary</div>
    <div class="nav-links">
      <a href="home.html">Logout</a>
    </div>
  </nav>

  <div class="app-layout">
    <aside class="sidebar">
      <a href="dashboard.html"><span class="icon">🏠</span> Dashboard</a>
      <a href="allocation.html" class="active"><span class="icon">📊</span> Allocation</a>
      <a href="expenses.html"><span class="icon">💸</span> Expenses</a>
      <a href="goals.html"><span class="icon">🎯</span> Goals</a>
      <a href="wishlist.html"><span class="icon">⭐</span> Wishlist</a>
      <a href="reports.html"><span class="icon">📈</span> Reports</a>
    </aside>

    <main class="main-content">
      <div class="page-header">
        <h1>Salary Allocation</h1>
        <p>Adjust the percentage for each category. Total must equal 100%.</p>
      </div>

      <div class="card">
        <!-- Total Progress -->
        <div class="total-indicator">
          <span>Total Allocated:</span>
          <strong id="totalLabel">100%</strong>
          <div style="flex:1">
            <div class="progress-bar-wrap">
              <div class="progress-bar-fill done" id="totalBar" style="width:100%"></div>
            </div>
          </div>
        </div>

        <!-- Sliders -->
        <div id="sliders"></div>

        <button class="btn btn-primary" id="saveAllocBtn" onclick="saveAllocation()" style="margin-top:1rem">
          💾 Save Allocation
        </button>
      </div>
    </main>
  </div>

  <script src="js/charts.js"></script>
  <script src="js/allocation.js"></script>
  <script>
    // Build sliders dynamically
    const container = document.getElementById('sliders');
    CATEGORIES.forEach(cat => {
      container.innerHTML += `
        <div class="slider-row">
          <div class="slider-label">
            ${cat}
            <span id="amt_${cat}">₹0</span>
          </div>
          <input type="range" id="slider_${cat}" min="0" max="100" value="0"
            oninput="onSliderChange('${cat}')"/>
          <div class="slider-value" id="val_${cat}">0%</div>
        </div>`;
    });
    initAllocation();
  </script>
</body>
</html>
