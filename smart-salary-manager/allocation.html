<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Allocation – SmartSalary</title>
  <link rel="stylesheet" href="css/style.css"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <nav class="navbar">
    <div class="nav-brand">💰 SmartSalary</div>
    <div class="nav-links">
      <a href="home.html">Logout</a>
    </div>
  </nav>

  <div class="app-layout">
    <aside class="sidebar">
      <a href="dashboard.html"><span class="icon">🏠</span> Dashboard</a>
      <a href="allocation.html" class="active"><span class="icon">📊</span> Allocation</a>
      <a href="expenses.html"><span class="icon">💸</span> Expenses</a>
      <a href="goals.html"><span class="icon">🎯</span> Goals</a>
      <a href="wishlist.html"><span class="icon">⭐</span> Wishlist</a>
      <a href="reports.html"><span class="icon">📈</span> Reports</a>
    </aside>

    <main class="main-content">
      <div class="page-header">
        <h1>Salary Allocation</h1>
        <p>Adjust the percentage for each category. Total must equal 100%.</p>
      </div>

      <!-- Two-column layout: sliders left, live chart right -->
      <div style="display:grid;grid-template-columns:1fr 340px;gap:1.5rem;align-items:start" class="alloc-grid">

        <div class="card">
          <!-- Total Progress -->
          <div class="total-indicator">
            <span>Total Allocated:</span>
            <strong id="totalLabel">100%</strong>
            <div style="flex:1">
              <div class="progress-bar-wrap">
                <div class="progress-bar-fill done" id="totalBar" style="width:100%"></div>
              </div>
            </div>
          </div>

          <!-- Sliders -->
          <div id="sliders"></div>

          <button class="btn btn-primary" id="saveAllocBtn" onclick="saveAllocation()" style="margin-top:1rem">
            💾 Save Allocation
          </button>
        </div>

        <!-- Live Donut Chart -->
        <div class="chart-card" style="position:sticky;top:80px">
          <h3>Live Preview</h3>
          <div class="chart-container">
            <canvas id="allocChart"></canvas>
          </div>
          <div id="allocAmountSummary" style="margin-top:1rem;display:grid;grid-template-columns:1fr 1fr;gap:0.4rem"></div>
        </div>

      </div>
    </main>
  </div>

  <script src="js/charts.js"></script>
  <script src="js/allocation.js"></script>
  <script>
    // Build sliders dynamically
    const container = document.getElementById('sliders');
    CATEGORIES.forEach(cat => {
      container.innerHTML += `
        <div class="slider-row">
          <div class="slider-label">
            ${cat}
            <span id="amt_${cat}">₹0</span>
          </div>
          <input type="range" id="slider_${cat}" min="0" max="100" value="0"
            oninput="onSliderChange('${cat}')"/>
          <div class="slider-value" id="val_${cat}">0%</div>
        </div>`;
    });
    initAllocation();

    // Patch renderAllocChart to also refresh the mini amount summary below the chart
    const _origRender = renderAllocChart;
    renderAllocChart = function() {
      _origRender();
      const salary = getSalary();
      const summary = document.getElementById('allocAmountSummary');
      if (!summary) return;
      summary.innerHTML = CATEGORIES.map((cat, i) => {
        const pct = parseInt(document.getElementById('slider_' + cat).value || 0);
        return `<div style="font-size:0.78rem;display:flex;justify-content:space-between;padding:0.2rem 0;border-bottom:1px solid var(--border)">
          <span style="color:${COLOR_VALUES[i]};font-weight:600">${cat}</span>
          <span>${fmt((pct/100)*salary)}</span>
        </div>`;
      }).join('');
    };
    renderAllocChart(); // trigger once to populate summary
  </script>
</body>
</html>
