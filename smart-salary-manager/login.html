<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login – SmartSalary</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <h2>💰 Welcome Back</h2>
      <p>Login to your SmartSalary account</p>

      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" class="form-control" id="email" placeholder="you@example.com" required/>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" class="form-control" id="password" placeholder="••••••••" required/>
        </div>
        <div id="loginError" style="color:var(--danger);font-size:0.85rem;margin-bottom:0.75rem;display:none;"></div>
        <button type="submit" class="btn btn-primary" style="width:100%">Login</button>
      </form>

      <div class="auth-footer">
        Don't have an account? <a href="register.html">Register</a>
      </div>
    </div>
  </div>

  <script>
    function handleLogin(e) {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errEl = document.getElementById('loginError');

      // Check stored user from registration
      const stored = JSON.parse(localStorage.getItem('ssm_user') || '{}');
      if (stored.email === email && stored.password === password) {
        localStorage.setItem('ssm_logged_in', 'true');
        window.location.href = 'dashboard.html';
      } else {
        errEl.textContent = 'Invalid email or password.';
        errEl.style.display = 'block';
      }
    }
  </script>
</body>
</html>
