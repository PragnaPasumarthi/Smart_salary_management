<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Goals – SmartSalary</title>
  <link rel="stylesheet" href="css/style.css"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <nav class="navbar">
    <div class="nav-brand">💰 SmartSalary</div>
    <div class="nav-links"><a href="home.html">Logout</a></div>
  </nav>

  <div class="app-layout">
    <aside class="sidebar">
      <a href="dashboard.html"><span class="icon">🏠</span> Dashboard</a>
      <a href="allocation.html"><span class="icon">📊</span> Allocation</a>
      <a href="expenses.html"><span class="icon">💸</span> Expenses</a>
      <a href="goals.html" class="active"><span class="icon">🎯</span> Goals</a>
      <a href="wishlist.html"><span class="icon">⭐</span> Wishlist</a>
      <a href="reports.html"><span class="icon">📈</span> Reports</a>
    </aside>

    <main class="main-content">
      <div class="page-header">
        <h1>Financial Goals</h1>
        <p>Set and track your savings & investment goals</p>
      </div>

      <!-- Add Goal Form -->
      <div class="card" style="margin-bottom:1.5rem">
        <h3 style="margin-bottom:1rem;font-size:1rem">Add New Goal</h3>
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:1rem;align-items:end">
          <div class="form-group" style="margin:0">
            <label>Goal Name</label>
            <input type="text" class="form-control" id="goalName" placeholder="e.g. Emergency Fund"/>
          </div>
          <div class="form-group" style="margin:0">
            <label>Target Amount (₹)</label>
            <input type="number" class="form-control" id="goalTarget" placeholder="e.g. 100000" min="0"/>
          </div>
          <div class="form-group" style="margin:0">
            <label>Amount Saved (₹)</label>
            <input type="number" class="form-control" id="goalSaved" placeholder="e.g. 25000" min="0"/>
          </div>
          <div class="form-group" style="margin:0">
            <label>Type</label>
            <select class="form-control" id="goalType">
              <option>Savings</option>
              <option>Investment</option>
              <option>Emergency</option>
              <option>Education</option>
            </select>
          </div>
          <button class="btn btn-primary" onclick="addGoal()">+ Add Goal</button>
        </div>
      </div>

      <!-- Goals Grid -->
      <div class="goals-grid" id="goalsGrid" style="margin-bottom:1.5rem">
        <p style="color:var(--text-muted)">No goals yet. Add one above!</p>
      </div>

      <!-- Line Chart -->
      <div class="chart-card">
        <h3>Monthly Savings Progress</h3>
        <div class="chart-container">
          <canvas id="goalsChart"></canvas>
        </div>
      </div>
    </main>
  </div>

  <script src="js/charts.js"></script>
  <script src="js/goals.js"></script>
  <script>initGoals();</script>
</body>
</html>
