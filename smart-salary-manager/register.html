<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register – SmartSalary</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <h2>💰 Create Account</h2>
      <p>Start managing your salary smarter today</p>

      <form id="registerForm" onsubmit="handleRegister(event)">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" class="form-control" id="name" placeholder="John Doe" required/>
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" class="form-control" id="email" placeholder="you@example.com" required/>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" class="form-control" id="password" placeholder="Min. 6 characters" minlength="6" required/>
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <input type="password" class="form-control" id="confirm" placeholder="Repeat password" required/>
        </div>
        <div id="regError" style="color:var(--danger);font-size:0.85rem;margin-bottom:0.75rem;display:none;"></div>
        <button type="submit" class="btn btn-primary" style="width:100%">Create Account</button>
      </form>

      <div class="auth-footer">
        Already have an account? <a href="login.html">Login</a>
      </div>
    </div>
  </div>

  <script>
    function handleRegister(e) {
      e.preventDefault();
      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm').value;
      const errEl = document.getElementById('regError');

      if (password !== confirm) {
        errEl.textContent = 'Passwords do not match.';
        errEl.style.display = 'block';
        return;
      }

      // Save user to localStorage
      localStorage.setItem('ssm_user', JSON.stringify({ name, email, password }));
      localStorage.setItem('ssm_logged_in', 'true');
      window.location.href = 'dashboard.html';
    }
  </script>
</body>
</html>
